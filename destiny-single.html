<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>命运之境 - 在线算命占卜</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a25;
            --accent-cyan: #00ffff;
            --accent-purple: #b026ff;
            --accent-pink: #ff26a8;
            --accent-gold: #ffd700;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .bg-effects {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            background: radial-gradient(ellipse at top, rgba(176,38,255,0.15), transparent 60%),
                        radial-gradient(ellipse at bottom, rgba(0,255,255,0.1), transparent 60%);
        }
        header { text-align: center; padding: 30px 20px; position: relative; z-index: 1; }
        .title {
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle { color: var(--text-secondary); margin-top: 10px; font-size: 0.95rem; }
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }
        .nav-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 12px 20px;
            background: var(--bg-card);
            border: 1px solid transparent;
            border-radius: 25px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .nav-btn:hover { border-color: var(--accent-cyan); color: var(--text-primary); }
        .nav-btn.active {
            background: linear-gradient(135deg, rgba(0,255,255,0.2), rgba(176,38,255,0.2));
            border-color: var(--accent-purple);
            color: var(--text-primary);
        }
        main { max-width: 800px; margin: 0 auto; padding: 15px; position: relative; z-index: 1; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .section-header { text-align: center; margin-bottom: 25px; }
        .section-header h2 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .section-header p { color: var(--text-secondary); margin-top: 8px; font-size: 0.85rem; }
        .form-group {
            background: var(--bg-card);
            border: 1px solid rgba(176,38,255,0.3);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .form-group label { display: block; color: var(--accent-cyan); margin-bottom: 8px; font-size: 0.9rem; }
        .form-group select, .form-group input {
            width: 100%;
            padding: 12px;
            background: var(--bg-secondary);
            border: 1px solid rgba(0,255,255,0.3);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
        }
        .form-group select:focus, .form-group input:focus { border-color: var(--accent-purple); }
        .form-group option { background: var(--bg-secondary); color: var(--text-primary); }
        .input-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .input-item { flex: 1; min-width: 100px; }
        .action-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .action-btn:active { transform: scale(0.98); }
        .result-container { animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .result-card {
            background: var(--bg-card);
            border: 1px solid rgba(0,255,255,0.3);
            border-radius: 15px;
            padding: 20px;
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(176,38,255,0.3);
            margin-bottom: 20px;
        }
        .zodiac-name { font-size: 1.2rem; color: var(--accent-cyan); }
        .result-date { color: var(--text-secondary); font-size: 0.85rem; }
        .hidden { display: none !important; }
        .fortune-grid { display: grid; gap: 12px; }
        .fortune-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: var(--bg-secondary);
            border-radius: 10px;
        }
        .fortune-icon { font-size: 1.3rem; }
        .fortune-label { min-width: 70px; color: var(--text-secondary); font-size: 0.85rem; }
        .fortune-bar { flex: 1; height: 8px; background: var(--bg-primary); border-radius: 4px; overflow: hidden; }
        .fortune-fill { height: 100%; border-radius: 4px; transition: width 1s; }
        .fortune-value { min-width: 40px; text-align: right; font-weight: 600; color: var(--accent-gold); font-size: 0.85rem; }
        .fortune-text {
            margin-top: 20px;
            padding: 15px;
            background: var(--bg-secondary);
            border-radius: 12px;
            border-left: 3px solid var(--accent-purple);
        }
        .fortune-text h4 { color: var(--accent-cyan); margin-bottom: 10px; font-size: 0.95rem; }
        .fortune-text p { color: var(--text-secondary); line-height: 1.7; font-size: 0.85rem; }
        .bazi-card { text-align: center; }
        .bazi-header h3 { color: var(--accent-cyan); font-size: 1.2rem; margin-bottom: 8px; }
        .bazi-header p { color: var(--text-secondary); font-size: 0.85rem; }
        .bazi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; }
        .bazi-pillar {
            background: linear-gradient(135deg, rgba(0,255,255,0.1), rgba(176,38,255,0.1));
            border: 1px solid rgba(176,38,255,0.5);
            border-radius: 10px;
            padding: 15px 8px;
        }
        .pillar-label { display: block; color: var(--text-secondary); font-size: 0.75rem; margin-bottom: 8px; }
        .pillar-gan { display: block; font-size: 1.5rem; font-weight: 700; color: var(--accent-cyan); }
        .pillar-zhi { display: block; font-size: 1.5rem; font-weight: 700; color: var(--accent-purple); }
        .bazi-analysis { background: var(--bg-secondary); border-radius: 12px; padding: 15px; margin-top: 15px; }
        .bazi-analysis h4 { color: var(--accent-cyan); margin-bottom: 12px; font-size: 0.95rem; }
        .analysis-content p { margin: 8px 0; color: var(--text-secondary); font-size: 0.85rem; }
        .analysis-content strong { color: var(--accent-pink); }
        .tarot-header { text-align: center; margin-bottom: 20px; }
        .tarot-header h3 { color: var(--accent-cyan); margin-bottom: 8px; font-size: 1rem; }
        .tarot-header p { color: var(--text-secondary); font-size: 0.85rem; }
        .tarot-cards { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; }
        .tarot-card { width: 100px; height: 160px; perspective: 800px; cursor: pointer; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .tarot-card.revealed .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back {
            position: absolute;
            width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
        }
        .card-back {
            background: linear-gradient(135deg, #1a1a25, #2a2a3a);
            border: 2px solid var(--accent-purple);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card-back::before { content: '🔮'; font-size: 2rem; }
        .card-front {
            background: linear-gradient(135deg, var(--bg-card), var(--bg-secondary));
            border: 2px solid var(--accent-cyan);
            transform: rotateY(180deg);
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .card-name { font-weight: 600; color: var(--accent-cyan); margin-bottom: 5px; font-size: 0.75rem; }
        .card-meaning { font-size: 0.65rem; color: var(--text-secondary); }
        .tarot-interpretation { background: var(--bg-card); border: 1px solid rgba(176,38,255,0.3); border-radius: 15px; padding: 15px; }
        .tarot-interpretation h4 { color: var(--accent-purple); margin-bottom: 15px; text-align: center; font-size: 0.95rem; }
        .tarot-position { margin-bottom: 15px; padding: 12px; background: var(--bg-secondary); border-radius: 8px; }
        .tarot-position strong { color: var(--accent-cyan); font-size: 0.85rem; }
        .tarot-position p { color: var(--text-secondary); margin-top: 8px; line-height: 1.6; font-size: 0.8rem; }
        .shuffling { text-align: center; padding: 30px; }
        .shuffle-animation { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
        .card-shuffle {
            width: 40px; height: 70px;
            background: linear-gradient(135deg, var(--accent-purple), var(--accent-pink));
            border-radius: 6px;
            animation: shuffle-move 1s ease-in-out infinite;
        }
        .card-shuffle:nth-child(2) { animation-delay: 0.2s; }
        .card-shuffle:nth-child(3) { animation-delay: 0.4s; }
        @keyframes shuffle-move {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-15px) rotate(5deg); }
            75% { transform: translateY(8px) rotate(-5deg); }
        }
        .shuffling p { color: var(--accent-cyan); animation: pulse 1s infinite; font-size: 0.9rem; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        footer { text-align: center; padding: 30px 15px; color: var(--text-secondary); position: relative; z-index: 1; }
        footer p { margin: 5px 0; font-size: 0.8rem; }
        .copyright { font-size: 0.75rem; opacity: 0.7; }
        @media (max-width: 600px) {
            .title { font-size: 1.8rem; }
            .nav-tabs { flex-direction: column; align-items: center; }
            .nav-btn { width: 100%; max-width: 280px; justify-content: center; }
            .input-row { flex-direction: column; }
            .input-item { width: 100%; }
            .bazi-grid { grid-template-columns: repeat(2, 1fr); }
            .tarot-cards { flex-direction: column; align-items: center; }
            .tarot-card { width: 80px; height: 130px; }
            .fortune-item { flex-wrap: wrap; }
            .fortune-bar { order: 3; width: 100%; }
        }
    </style>
</head>
<body>
    <div class="bg-effects"></div>
    <header>
        <h1 class="title">✦ 命运之境 ✦</h1>
        <p class="subtitle">探索命运的奥秘，窥见未来的光芒</p>
    </header>
    <nav class="nav-tabs">
        <button class="nav-btn active" data-tab="horoscope"><span>✨</span> 星座运势</button>
        <button class="nav-btn" data-tab="bazi"><span>☯</span> 八字算命</button>
        <button class="nav-btn" data-tab="tarot"><span>🔮</span> 塔罗牌占卜</button>
    </nav>
    <main>
        <!-- 星座运势 -->
        <section id="horoscope" class="tab-content active">
            <div class="section-header">
                <h2>星座运势</h2>
                <p>选择你的星座，查看今日运势</p>
            </div>
            <div class="form-group">
                <label>选择星座</label>
                <select id="zodiac-sign">
                    <option value="aries">♈ 白羊座 (3.21-4.19)</option>
                    <option value="taurus">♉ 金牛座 (4.20-5.20)</option>
                    <option value="gemini">♊ 双子座 (5.21-6.21)</option>
                    <option value="cancer">♋ 巨蟹座 (6.22-7.22)</option>
                    <option value="leo">♌ 狮子座 (7.23-8.22)</option>
                    <option value="virgo">♍ 处女座 (8.23-9.22)</option>
                    <option value="libra">♎ 天秤座 (9.23-10.23)</option>
                    <option value="scorpio">♏ 天蝎座 (10.24-11.22)</option>
                    <option value="sagittarius">♐ 射手座 (11.23-12.21)</option>
                    <option value="capricorn">♑ 摩羯座 (12.22-1.19)</option>
                    <option value="aquarius">♒ 水瓶座 (1.20-2.18)</option>
                    <option value="pisces">♓ 双鱼座 (2.19-3.20)</option>
                </select>
                <button id="get-horoscope-btn" class="action-btn">查看今日运势</button>
            </div>
            <div id="horoscope-result" class="result-container hidden">
                <div class="result-card">
                    <div class="result-header">
                        <span id="result-zodiac" class="zodiac-name"></span>
                        <span id="result-date" class="result-date"></span>
                    </div>
                    <div class="fortune-grid">
                        <div class="fortune-item">
                            <span class="fortune-icon">🌟</span>
                            <span class="fortune-label">整体运势</span>
                            <div class="fortune-bar"><div class="fortune-fill" id="overall-bar"></div></div>
                            <span class="fortune-value" id="overall-value"></span>
                        </div>
                        <div class="fortune-item">
                            <span class="fortune-icon">💕</span>
                            <span class="fortune-label">爱情运势</span>
                            <div class="fortune-bar"><div class="fortune-fill" id="love-bar"></div></div>
                            <span class="fortune-value" id="love-value"></span>
                        </div>
                        <div class="fortune-item">
                            <span class="fortune-icon">💰</span>
                            <span class="fortune-label">财运</span>
                            <div class="fortune-bar"><div class="fortune-fill" id="money-bar"></div></div>
                            <span class="fortune-value" id="money-value"></span>
                        </div>
                        <div class="fortune-item">
                            <span class="fortune-icon">💼</span>
                            <span class="fortune-label">事业</span>
                            <div class="fortune-bar"><div class="fortune-fill" id="career-bar"></div></div>
                            <span class="fortune-value" id="career-value"></span>
                        </div>
                        <div class="fortune-item">
                            <span class="fortune-icon">🏥</span>
                            <span class="fortune-label">健康</span>
                            <div class="fortune-bar"><div class="fortune-fill" id="health-bar"></div></div>
                            <span class="fortune-value" id="health-value"></span>
                        </div>
                    </div>
                    <div class="fortune-text">
                        <h4>📜 今日指引</h4>
                        <p id="fortune-guidance"></p>
                    </div>
                </div>
            </div>
        </section>
        <!-- 八字算命 -->
        <section id="bazi" class="tab-content">
            <div class="section-header">
                <h2>八字算命</h2>
                <p>输入出生信息，解析命理财运</p>
            </div>
            <div class="form-group">
                <div class="input-row">
                    <div class="input-item">
                        <label>姓名</label>
                        <input type="text" id="name" placeholder="请输入姓名">
                    </div>
                    <div class="input-item">
                        <label>性别</label>
                        <select id="gender">
                            <option value="male">男</option>
                            <option value="female">女</option>
                        </select>
                    </div>
                </div>
                <div class="input-row">
                    <div class="input-item">
                        <label>出生年份</label>
                        <select id="birth-year"></select>
                    </div>
                    <div class="input-item">
                        <label>月份</label>
                        <select id="birth-month">
                            <option value="1">1 月</option><option value="2">2 月</option><option value="3">3 月</option>
                            <option value="4">4 月</option><option value="5">5 月</option><option value="6">6 月</option>
                            <option value="7">7 月</option><option value="8">8 月</option><option value="9">9 月</option>
                            <option value="10">10 月</option><option value="11">11 月</option><option value="12">12 月</option>
                        </select>
                    </div>
                    <div class="input-item">
                        <label>日期</label>
                        <select id="birth-day"></select>
                    </div>
                    <div class="input-item">
                        <label>时辰</label>
                        <select id="birth-hour">
                            <option value="0">子时 (23-1 点)</option><option value="1">丑时 (1-3 点)</option><option value="2">寅时 (3-5 点)</option>
                            <option value="3">卯时 (5-7 点)</option><option value="4">辰时 (7-9 点)</option><option value="5">巳时 (9-11 点)</option>
                            <option value="6">午时 (11-13 点)</option><option value="7">未时 (13-15 点)</option><option value="8">申时 (15-17 点)</option>
                            <option value="9">酉时 (17-19 点)</option><option value="10">戌时 (19-21 点)</option><option value="11">亥时 (21-23 点)</option>
                        </select>
                    </div>
                </div>
                <button id="get-bazi-btn" class="action-btn">排八字命盘</button>
            </div>
            <div id="bazi-result" class="result-container hidden">
                <div class="result-card bazi-card">
                    <div class="bazi-header">
                        <h3 id="bazi-name"></h3>
                        <p id="bazi-info"></p>
                    </div>
                    <div class="bazi-grid">
                        <div class="bazi-pillar">
                            <span class="pillar-label">年柱</span>
                            <span class="pillar-gan" id="year-gan"></span>
                            <span class="pillar-zhi" id="year-zhi"></span>
                        </div>
                        <div class="bazi-pillar">
                            <span class="pillar-label">月柱</span>
                            <span class="pillar-gan" id="month-gan"></span>
                            <span class="pillar-zhi" id="month-zhi"></span>
                        </div>
                        <div class="bazi-pillar">
                            <span class="pillar-label">日柱</span>
                            <span class="pillar-gan" id="day-gan"></span>
                            <span class="pillar-zhi" id="day-zhi"></span>
                        </div>
                        <div class="bazi-pillar">
                            <span class="pillar-label">时柱</span>
                            <span class="pillar-gan" id="hour-gan"></span>
                            <span class="pillar-zhi" id="hour-zhi"></span>
                        </div>
                    </div>
                    <div class="bazi-analysis">
                        <h4>📜 命理分析</h4>
                        <div class="analysis-content">
                            <p><strong>日元：</strong><span id="riyuan"></span></p>
                            <p><strong>五行：</strong><span id="wuxing"></span></p>
                            <p><strong>生肖：</strong><span id="shengxiao"></span></p>
                        </div>
                    </div>
                    <div class="fortune-text"><h4>💫 性格特征</h4><p id="bazi-personality"></p></div>
                    <div class="fortune-text"><h4>💰 财运分析</h4><p id="bazi-wealth"></p></div>
                    <div class="fortune-text"><h4>💕 感情运势</h4><p id="bazi-love"></p></div>
                </div>
            </div>
        </section>
        <!-- 塔罗牌占卜 -->
        <section id="tarot" class="tab-content">
            <div class="section-header">
                <h2>塔罗牌占卜</h2>
                <p>静心默念问题，抽取属于你的塔罗牌</p>
            </div>
            <div class="form-group">
                <label>在心中默念你的问题</label>
                <input type="text" id="tarot-question" placeholder="例如：我近期的感情运势如何？">
                <div style="margin-top: 15px;">
                    <label>选择牌阵</label>
                    <select id="tarot-spread">
                        <option value="single">单张牌占卜 - 简单指引</option>
                        <option value="three">三张牌阵 - 过去/现在/未来</option>
                        <option value="celtic">凯尔特十字 - 全面解析</option>
                    </select>
                </div>
                <button id="draw-tarot-btn" class="action-btn">🔮 开始抽牌</button>
            </div>
            <div id="tarot-result" class="result-container hidden">
                <div class="tarot-header">
                    <h3 id="tarot-question-display"></h3>
                    <p id="tarot-spread-info"></p>
                </div>
                <div id="tarot-cards" class="tarot-cards"></div>
                <div id="tarot-interpretation" class="tarot-interpretation"></div>
            </div>
            <div id="tarot-shuffling" class="shuffling hidden">
                <div class="shuffle-animation">
                    <div class="card-shuffle"></div>
                    <div class="card-shuffle"></div>
                    <div class="card-shuffle"></div>
                </div>
                <p>正在洗牌...</p>
            </div>
        </section>
    </main>
    <footer>
        <p>✨ 本结果仅供娱乐参考，命运掌握在自己手中 ✨</p>
        <p class="copyright">© 2026 命运之境</p>
    </footer>
    <script>
        // 选项卡切换
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
            });
        });
        // 初始化年份选择
        (function initYearSelect() {
            const yearSelect = document.getElementById('birth-year');
            const currentYear = new Date().getFullYear();
            for (let i = currentYear; i >= currentYear - 100; i--) {
                const option = document.createElement('option');
                option.value = i;
                option.textContent = i + '年';
                yearSelect.appendChild(option);
            }
            const daySelect = document.getElementById('birth-day');

            return { gan: tiangan[diffDays % 10 < 0 ? diffDays % 10 + 10 : diffDays % 10], zhi: dizhi[diffDays % 12 < 0 ? diffDays % 12 + 12 : diffDays % 12] };
